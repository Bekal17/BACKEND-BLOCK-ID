# BlockID Docker production deployment
# Usage: docker compose up -d
# Create production.env from production.env.example before first run

services:
  blockid-db:
    image: postgres:15
    environment:
      POSTGRES_DB: blockid
      POSTGRES_USER: blockid
      POSTGRES_PASSWORD: securepass
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - postgres

  blockid-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - production.env
    environment:
      - DB_PATH=/app/data/blockid.db
    volumes:
      - blockid_data:/app/data
      - blockid_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  blockid-pipeline:
    build: .
    command: ["python", "-m", "backend_blockid.tools.run_full_pipeline"]
    env_file:
      - production.env
    environment:
      - DB_PATH=/app/data/blockid.db
    volumes:
      - blockid_data:/app/data
      - blockid_logs:/app/logs
    depends_on:
      blockid-api:
        condition: service_healthy
    restart: "no"
    profiles:
      - pipeline

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus-docker.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  blockid_data:
  blockid_logs:
  grafana_data:
  pgdata:
