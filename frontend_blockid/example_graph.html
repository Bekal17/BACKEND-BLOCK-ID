<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockID Wallet Graph - D3.js</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #1a1a2e; color: #eee; }
    #controls { padding: 1rem; display: flex; gap: 1rem; align-items: center; }
    #controls input, #controls select { padding: 0.5rem; border-radius: 4px; border: 1px solid #444; background: #2a2a4e; color: #eee; }
    #controls button { padding: 0.5rem 1rem; background: #4a4a8e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #controls button:hover { background: #5a5a9e; }
    #graph { width: 100%; height: calc(100vh - 60px); }
    .node { cursor: pointer; }
    .node:hover { stroke: #fff; stroke-width: 2px; }
    .link { stroke-opacity: 0.5; }
    .tooltip { position: absolute; padding: 0.5rem 0.75rem; background: rgba(0,0,0,0.9); border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 100; }
  </style>
</head>
<body>
  <div id="controls">
    <label>API base: <input id="apiBase" value="http://localhost:8000" size="24" /></label>
    <label>Cluster ID: <input id="clusterId" type="number" value="1" min="1" /></label>
    <button id="btnCluster">Load Cluster Graph</button>
    <label>Wallet: <input id="wallet" placeholder="wallet address" size="40" /></label>
    <label>Depth: <input id="depth" type="number" value="2" min="1" max="5" /></label>
    <button id="btnWallet">Load Wallet Graph</button>
    <span id="status"></span>
  </div>
  <div id="graph"></div>
  <div id="tooltip" class="tooltip" style="display:none;"></div>

  <script>
    const riskColors = { "0": "#22c55e", "1": "#eab308", "2": "#f97316", "3": "#ef4444" };

    function renderGraph(data) {
      d3.select("#graph svg").remove();
      if (!data || !data.nodes || !data.links) {
        document.getElementById("status").textContent = "No data";
        return;
      }

      const width = document.getElementById("graph").clientWidth;
      const height = document.getElementById("graph").clientHeight;

      const links = data.links.map(d => ({ ...d }));
      const nodes = data.nodes.map(d => ({ ...d }));

      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(80))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(20));

      const svg = d3.select("#graph").append("svg")
        .attr("width", width)
        .attr("height", height);

      const g = svg.append("g");

      const link = g.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke", "#666")
        .attr("stroke-width", d => Math.sqrt(d.amount || 1))
        .attr("stroke-opacity", 0.6);

      const node = g.append("g")
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("class", "node")
        .attr("r", 8)
        .attr("fill", d => riskColors[d.risk] || "#6b7280")
        .attr("stroke", "#333")
        .attr("stroke-width", 1)
        .call(d3.drag()
          .on("start", (e, d) => {
            if (!e.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          })
          .on("drag", (e, d) => {
            d.fx = e.x;
            d.fy = e.y;
          })
          .on("end", (e, d) => {
            if (!e.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          }))
        .on("mouseover", (e, d) => {
          const tip = document.getElementById("tooltip");
          tip.style.display = "block";
          tip.style.left = (e.pageX + 10) + "px";
          tip.style.top = (e.pageY + 10) + "px";
          tip.innerHTML = `Wallet: ${d.id}<br>Score: ${d.score}<br>Risk: ${d.risk}`;
        })
        .on("mouseout", () => {
          document.getElementById("tooltip").style.display = "none";
        });

      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
      });

      document.getElementById("status").textContent =
        `Nodes: ${nodes.length} | Links: ${links.length}`;
    }

    async function loadCluster() {
      const base = document.getElementById("apiBase").value.replace(/\/$/, "");
      const id = document.getElementById("clusterId").value;
      document.getElementById("status").textContent = "Loading...";
      try {
        const r = await fetch(`${base}/graph/cluster/${id}`);
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();
        renderGraph(data);
      } catch (e) {
        document.getElementById("status").textContent = "Error: " + e.message;
        renderGraph(null);
      }
    }

    async function loadWallet() {
      const base = document.getElementById("apiBase").value.replace(/\/$/, "");
      const wallet = document.getElementById("wallet").value.trim();
      const depth = document.getElementById("depth").value;
      if (!wallet) {
        document.getElementById("status").textContent = "Enter wallet address";
        return;
      }
      document.getElementById("status").textContent = "Loading...";
      try {
        const r = await fetch(`${base}/graph/wallet/${encodeURIComponent(wallet)}?depth=${depth}`);
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();
        renderGraph(data);
      } catch (e) {
        document.getElementById("status").textContent = "Error: " + e.message;
        renderGraph(null);
      }
    }

    document.getElementById("btnCluster").addEventListener("click", loadCluster);
    document.getElementById("btnWallet").addEventListener("click", loadWallet);
  </script>
</body>
</html>
