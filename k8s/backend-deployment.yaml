apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockid-api
  namespace: blockid
  labels:
    app: blockid-api
spec:
  replicas: 1  # Use 1 for SQLite (single writer); scale to 2+ with PostgreSQL
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: blockid-api
  template:
    metadata:
      labels:
        app: blockid-api
    spec:
      containers:
        - name: api
          image: blockid:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: blockid-config
            - secretRef:
                name: blockid-secrets
                optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: blockid-data
